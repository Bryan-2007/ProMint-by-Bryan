<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="student-login.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>

<body class="body" onload="getWalletAddress()">    <!-- calls the function when this html page is loaded-->
    <section class="header">
        <div>Dashboard</div>

        <div class="logout" onclick="logout()">Logout</div>
    </section><br>

    <section class="user-info">
        <h3 class="wallet-address"></h3>    <!--inserted using .js file-->
    </section><br>

    <section class="projects">
        <div class="projects-header">YOUR PROJECTS</div>
        <hr class="hr1">

        <div class="projects-options">
            <input type="text" class="projects-search" placeholder="Type project name...">
            
            <div class="mint-button">New Project +</div>
        </div><hr class="hr2">

        <div class="mint-project">
            <div class="mint-options">
                <label for="project-title" class="project-title">Enter Wallet Address</label>
                <input type="text" id="project-title" placeholder="eg. AI image classifier"><br>

                <label for="project-desc" class="project-desc">Enter Project Description</label>
                <input type="text" id="project-desc" placeholder="eg. This classifies ... dogs and cats"><br>

                <label for="date-completed" class="date-completed">Enter Your Designation</label>
                <input type="text" id="date-completed" placeholder="eg. 13th Jan 2024"><br><br>
            </div>
            
            <div class="mint-project-footer">
                <div class="submit">Submit</div>
                <div class="cancel">Cancel</div>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>

</html>
