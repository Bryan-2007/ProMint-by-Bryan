<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ProMint</title>
    <link rel="stylesheet" href="student-login.css">
</head>

<body class="body" onload="getWalletAddress(); renderStudentProjects(); showLoginSuccessToast()">

    <!-- Toast Notification Container -->

    <div id="toastContainer" class="toast-container"></div>

    <!-- Navigation Bar -->

    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <img src="../assets/logo.png" alt="ProMint Logo" class="logo-image">
                <span class="logo-text">ProMint</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <button class="logout" onclick="logout()">Logout</button>
                <button class="theme-toggle-button" id="themeToggle">🌙</button>
            </div>
        </div>
    </nav>

    <!-- User Info and Dashboard Header -->

    <section class="header">
        <div>Student Dashboard</div>
        <h3 class="wallet-address"></h3> <!--inserted using .js file-->
    </section><br>

    <!-- Projects Section -->

    <section class="projects">
        <div class="projects-header">YOUR PROJECTS</div>
        <hr class="hr1">

        <div class="projects-options">
            <input type="text" class="projects-search" placeholder="Type project name...">

            <div class="new-project-button">New Project +</div>
        </div>
        <hr class="hr2">

        <div class="popup-backdrop"></div>

        <div class="new-project">
            <div class="new-project-options">
                <label for="project-name" class="project-title">Project Name</label>
                <input type="text" id="project-name" placeholder="eg. AI image classifier"><br>

                <label for="project-domains" class="project-desc">Domains</label>
                <input type="text" id="project-domains" placeholder="eg. Web3, AI, IoT"><br>

                <label for="date-completed" class="date-completed">Date Completed</label>
                <input type="text" id="date-completed" placeholder="eg. 13th Jan 2024"><br><br>
            </div>

            <div class="new-project-footer">
                <div class="new-project-submit">Submit</div>
                <div class="cancel">Cancel</div>
            </div>
        </div>

        <div class="display-project">

            <!-- Will be populated by JS -->

        </div>
    </section>

    <!-- Contract Address Section -->

    <section class="contract-section">
        <div class="contract-info">
            <span class="contract-label">Contract Address:</span>
            <span class="contract-address"></span>
        </div>
    </section>

    <!-- Include ethers if needed, though strictly we mint from faculty -->
     
    <script src="https://unpkg.com/ethers@6.11.1/dist/ethers.umd.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
