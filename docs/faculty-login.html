<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login</title>
    <link rel="stylesheet" href="student-login.css">
</head>

<body class="body" onload="getWalletAddress(); renderFacultyDashboard()">
    <section class="header">
        <div>Faculty Dashboard</div>

        <div class="logout" onclick="logout()">Logout</div>
    </section><br>

    <section class="user-info">
        <h3 class="wallet-address"></h3> <!--inserted using .js file-->
    </section><br>

    <section class="projects">
        <div class="projects-header">ALL STUDENT PROJECTS</div>
        <hr class="hr1">

        <div class="projects-options">
            <input type="text" class="projects-search" placeholder="Type project name...">
        </div>
        <hr class="hr2">

        <div class="display-all-projects">
            <!-- Dynamically populated by app.js -->
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
