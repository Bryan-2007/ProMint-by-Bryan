<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - ProMint</title>
    <link rel="stylesheet" href="student-login.css">
</head>

<body class="body" onload="getWalletAddress(); renderFacultyDashboard(); showLoginSuccessToast()">
    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <img src="../assets/logo.png" alt="ProMint Logo" class="logo-image">
                <span class="logo-text">ProMint</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <button class="logout" onclick="logout()">Logout</button>
                <button class="theme-toggle-button" id="themeToggle">🌙</button>
            </div>
        </div>
    </nav>

    <!-- User Info and Dashboard Header -->
    <section class="header">
        <div>Faculty Dashboard</div>
        <h3 class="wallet-address"></h3> <!--inserted using .js file-->
    </section><br>

    <!-- Projects Section -->
    <section class="projects">
        <div class="projects-header">ALL STUDENT PROJECTS</div>
        <hr class="hr1">

        <div class="projects-options">
            <input type="text" class="projects-search" placeholder="Type project name...">
        </div>
        <hr class="hr2">

        <div class="display-all-projects">
            <!-- Dynamically populated by app.js -->
        </div>
    </section>

    <!-- Contract Address Section (Faculty Only) -->
    <section class="contract-section">
        <div class="contract-info">
            <span class="contract-label">Contract Address:</span>
            <span class="contract-address"></span>
        </div>
    </section>

    <script src="https://unpkg.com/ethers@6.11.1/dist/ethers.umd.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
