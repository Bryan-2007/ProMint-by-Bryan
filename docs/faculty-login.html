<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login</title>
</head>

<body>
    
    <section class="projects">
        <div class="projects-header">YOUR PROJECTS</div>
        <hr class="hr1">

        <div class="projects-options">
            <input type="text" class="projects-search" placeholder="Type project name...">
            
            <div class="mint-button">New Project +</div>
        </div><hr class="hr2">

        <div class="mint-project">
            <div class="mint-options">
                <label for="wallet-address" class="wallet-add">Enter Wallet Address</label>
                <input type="text" id="wallet-address" placeholder="eg. 0x3...8A3"><br>

                <label for="project-review" class="pro-review">Enter Project Review</label>
                <input type="text" id="project-review" placeholder="eg. innovative, good"><br>

                <label for="designation" class="minter-desig">Enter Your Designation</label>
                <input type="text" id="designation" placeholder="eg. associate professor IT"><br><br>
            </div>
            
            <div class="mint-project-footer">
                <div class="submit">Submit</div>
                <div class="cancel">Cancel</div>
            </div>
        </div>
    </section>

</body>

</html>
